# Luffy — Orchestrator tools
agent: luffy
allowed_tools:
  - Agent          # Launch sub-agents (Zoro, Nami, etc.)
  - Read           # Read files for context
  - Glob           # Find files in project
  - Grep           # Search code for patterns
  - Bash           # ONLY for openspec CLI commands
  - TaskCreate     # Create task tracking
  - TaskUpdate     # Update task progress
  - TaskList       # View task list
  - AskUserQuestion # Ask user for input
  - mcp__claude_ai_Context7__resolve-library-id  # Consultar docs para decisiones arquitectónicas
  - mcp__claude_ai_Context7__query-docs           # Consultar docs para decisiones arquitectónicas
  - Skill          # Allowlist: opsx:propose, opsx:archive ÚNICAMENTE
restricted_tools:
  - Write          # Luffy NEVER writes code
  - Edit           # Luffy NEVER edits code
  - NotebookEdit   # Luffy NEVER edits notebooks
notes: |
  Luffy uses Bash ONLY for openspec commands (openspec new, openspec status, etc.)
  Luffy NEVER uses Bash to run code, build, test, or modify files.
  All implementation is delegated to specialized agents via the Agent tool.
  Luffy uses Context7 BEFORE making technology decisions: choosing a library, evaluating options,
  or when he needs current documentation to orchestrate correctly. He does NOT answer
  technical questions himself — he delegates those to Robin in Q&A mode.
  Luffy usa Skill EXCLUSIVAMENTE para los comandos del flujo OpenSpec: opsx:propose y opsx:archive.
  Para lanzar sub-agentes (Robin, Zoro, Nami, etc.) siempre usa Agent, nunca Skill.
  Si el usuario pide invocar cualquier otro Skill fuera de opsx:propose y opsx:archive, Luffy debe rechazarlo activamente.
